// ═══ SUPABASE CLIENT ═══
function db(table){
  const H={"Content-Type":"application/json",apikey:SK,Authorization:`Bearer ${SK}`};
  const U=`${SB}/rest/v1/${table}`;
  const clean=r=>Object.fromEntries(Object.entries(r).filter(([,v])=>v!==undefined));
  return {
    all:async()=>{
      try{const r=await fetch(`${U}?select=*&limit=2000`,{headers:H});
        if(!r.ok){console.error(`GET ${table}:`,await r.text());return[];}
        return await r.json();
      }catch(e){console.error(e);return[];}
    },
    where:async(f,v)=>{
      try{const r=await fetch(`${U}?${f}=eq.${encodeURIComponent(v)}&select=*`,{headers:H});
        return r.ok?await r.json():[];
      }catch{return[];}
    },
    ins:async(row)=>{
      try{
        const body=JSON.stringify(clean(row));
        const r=await fetch(U,{method:"POST",headers:{...H,Prefer:"return=representation"},body});
        if(!r.ok){const e=await r.text();console.error(`INSERT ${table}:`,e);return null;}
        const d=await r.json();return Array.isArray(d)?d[0]:d;
      }catch(e){console.error(e);return null;}
    },
    upd:async(id,row)=>{
      try{const r=await fetch(`${U}?id=eq.${encodeURIComponent(id)}`,{method:"PATCH",headers:H,body:JSON.stringify(clean(row))});
        if(!r.ok)console.error(`PATCH ${table}:`,await r.text());
      }catch(e){console.error(e);}
    },
    del:async(id)=>{
      try{const r=await fetch(`${U}?id=eq.${encodeURIComponent(id)}`,{method:"DELETE",headers:H});
        if(!r.ok)console.error(`DELETE ${table}:`,await r.text());
      }catch(e){console.error(e);}
    },
  };
}

// ═══ WHATSAPP INVOICE ═══
function sendWAInv(inv,items,type="فاتورة"){
  const subtotal=items.reduce((s,i)=>s+(+i.qty||1)*(+i.unitPrice||0),0);
  const disc=+inv.discount||0;const discAmt=inv.discount_type||inv.discountType==="pct"?(subtotal*disc/100):disc;
  const total=subtotal-discAmt;
  const pays=Array.isArray(inv.payments_list)?inv.payments_list:[];
  const totalPaid=pays.reduce((s,p)=>s+(+p.amount||0),0);
  const remaining=Math.max(0,total-totalPaid);
  let m=`🏢 *${type} رقم: ${inv.id||"—"}*\n${"━".repeat(25)}\n`;
  if(inv.client_name)m+=`👤 العميل: ${inv.client_name}\n`;
  if(inv.supplier)m+=`🏭 المورد: ${inv.supplier}\n`;
  m+=`📅 التاريخ: ${inv.date||"—"}\n${"━".repeat(25)}\n`;
  items.forEach((it,i)=>{m+=`${i+1}. ${it.name}: ${it.qty||1} × ${fmtN(+it.unitPrice||0)} = *${fmtN((+it.qty||1)*(+it.unitPrice||0))} ج.م*\n`;});
  m+=`${"━".repeat(25)}\n💰 الإجمالي: ${fmtN(subtotal)} ج.م\n`;
  if(disc>0)m+=`🔖 خصم: - ${fmtN(discAmt)} ج.م\n`;
  if(pays.length>0){m+=`✅ المدفوع: ${fmtN(totalPaid)} ج.م\n`;}
  m+=`📌 *الباقي: ${fmtN(remaining)} ج.م*`;
  window.open(`https://wa.me/?text=${encodeURIComponent(m)}`,"_blank");
}

// ═══ ACCOUNTING HELPERS ═══
async function custodyDeduct(empUsername,amount,reason){
  if(!empUsername||!amount||+amount<=0)return;
  try{
    const emps=await db("employees").all();
    const emp=emps.find(e=>e.username===empUsername);
    if(!emp)return;
    const accs=await db("custody").all();
    const acc=accs.find(a=>a.employee_id===emp.id);
    if(!acc)return;
    const nb=(+acc.balance||0)-(+amount);
    await db("custody").upd(acc.id,{balance:nb,last_updated:now()});
    await db("custody_transactions").ins({id:uid(),from_id:emp.id,from_type:"employee",to_id:"company",to_type:"company",amount:+amount,transfer_cost:0,reason,transaction_type:"deduct",date:now(),created_by:empUsername});
  }catch(e){console.error("custodyDeduct:",e);}
}

async function custodyAdd(empUsername,amount,reason){
  if(!empUsername||!amount||+amount<=0)return;
  try{
    const emps=await db("employees").all();
    const emp=emps.find(e=>e.username===empUsername);
    if(!emp)return;
    const accs=await db("custody").all();
    let acc=accs.find(a=>a.employee_id===emp.id);
    if(!acc){acc={id:uid(),employee_id:emp.id,employee_name:emp.name,balance:0,last_updated:now()};await db("custody").ins(acc);}
    const nb=(+acc.balance||0)+(+amount);
    await db("custody").upd(acc.id,{balance:nb,last_updated:now()});
    await db("custody_transactions").ins({id:uid(),from_id:"company",from_type:"company",to_id:emp.id,to_type:"employee",amount:+amount,transfer_cost:0,reason,transaction_type:"deposit",date:now(),created_by:empUsername});
  }catch(e){console.error("custodyAdd:",e);}
}

// ═══ REVIEW ═══
function ReviewPage({cu}){
  const [pending,sP]=useState([]);const [delReqs,sDR]=useState([]);
  const load=()=>{
    db("pending_transactions").all().then(d=>sP(d.filter(x=>x.status==="pending").sort((a,b)=>b.created_at>a.created_at?1:-1)));
    db("delete_requests").all().then(d=>sDR(d.filter(x=>x.status==="pending").sort((a,b)=>b.created_at>a.created_at?1:-1)));
  };
  useEffect(()=>{ load(); },[]);
  const approveTx=async tx=>{
    try{
      const data=typeof tx.data==="string"?JSON.parse(tx.data):tx.data;
      if(data){
        if(tx.type==="expense"){
          const r=await db("expenses").ins({...data,paid:true});
          if(r)await custodyDeduct(tx.created_by,+tx.amount,`مصروف موافق عليه: ${data.description||""}`);
        } else if(tx.type==="purchase_invoice"){
          const r=await db("invoices").ins({...data,status:"paid"});
          if(r)await custodyDeduct(tx.created_by,+tx.amount,`فاتورة مشتريات موافق عليها: ${data.supplier||""}`);
        }
      }
    }catch(e){console.error(e);}
    await db("pending_transactions").upd(tx.id,{status:"approved",reviewed_by:cu.username});
    sP(p=>p.filter(x=>x.id!==tx.id));
  };
  const rejectTx=async tx=>{await db("pending_transactions").upd(tx.id,{status:"rejected",reviewed_by:cu.username});sP(p=>p.filter(x=>x.id!==tx.id));};
  const approveDel=async req=>{
    try{await db(req.table_name).del(req.record_id);}catch(e){console.error(e);}
    await db("delete_requests").upd(req.id,{status:"approved",reviewed_by:cu.username});sDR(p=>p.filter(x=>x.id!==req.id));
  };
  const rejectDel=async req=>{await db("delete_requests").upd(req.id,{status:"rejected",reviewed_by:cu.username});sDR(p=>p.filter(x=>x.id!==req.id));};
  const total=pending.length+delReqs.length;
  return(<div>
    <div style={{fontSize:18,fontWeight:800,marginBottom:3}}>📌 المراجعة</div>
    <div style={{fontSize:11,color:C.mu,marginBottom:16}}>{total} معاملة بانتظار الموافقة</div>
    {total===0&&<div style={{...card,textAlign:"center",color:C.mu,padding:40}}>✅ لا توجد معاملات بانتظار المراجعة</div>}
    {delReqs.length>0&&<div style={{...card,borderRight:`4px solid ${C.rd}`}}>
      <div style={{fontSize:13,fontWeight:700,marginBottom:11,color:C.rd}}>🗑 طلبات الحذف ({delReqs.length})</div>
      {delReqs.map(r=>(<div key={r.id} style={{borderBottom:`1px solid ${C.br}`,paddingBottom:9,marginBottom:9}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:7}}>
          <div><div style={{fontWeight:600,fontSize:13}}>{r.description}</div><div style={{fontSize:10,color:C.mu}}>الجدول: {r.table_name} · بواسطة: {r.requested_by} · {r.created_at}</div></div>
          {cu.role==="admin"&&<div style={{display:"flex",gap:6}}><button style={{...btn("success"),padding:"5px 11px"}} onClick={()=>approveDel(r)}>✅ موافقة</button><button style={{...btn("danger"),padding:"5px 11px"}} onClick={()=>rejectDel(r)}>❌ رفض</button></div>}
        </div>
      </div>))}
    </div>}
    {pending.map(tx=>(<div key={tx.id} style={{...card,borderRight:`4px solid ${C.am}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:7}}>
        <div><div style={{fontWeight:600,fontSize:13}}>{tx.description}</div><div style={{fontSize:10,color:C.mu}}>{tx.type} · {tx.date} · {tx.created_by}</div>{tx.amount>0&&<div style={{fontSize:14,fontWeight:800,color:C.am,marginTop:3}}>{fmtN(tx.amount)} ج.م</div>}</div>
        {cu.role==="admin"&&<div style={{display:"flex",gap:6}}><button style={{...btn("success"),padding:"5px 11px"}} onClick={()=>approveTx(tx)}>✅ موافقة وترحيل</button><button style={{...btn("danger"),padding:"5px 11px"}} onClick={()=>rejectTx(tx)}>❌ رفض</button></div>}
      </div>
    </div>))}
  </div>);
}

function Attendance({employees,users,cu,canEdit}){
  const [records,sR]=useState([]);const [show,sSh]=useState(false);const [selEmp,sSE]=useState("");const [confirmDel,sCD]=useState(null);
  const [form,sF]=useState({employee_id:"",employee_name:"",date:now(),check_in:"",check_out:"",notes:""});
  const fv=(k,v)=>sF(p=>({...p,[k]:v}));
  useEffect(()=>{db("attendance").all().then(d=>sR(d.sort((a,b)=>b.date>a.date?1:-1)));}, []);
  const calcH=(ci,co)=>{if(!ci||!co)return 0;const[h1,m1]=ci.split(":").map(Number);const[h2,m2]=co.split(":").map(Number);return Math.max(0,((h2*60+m2)-(h1*60+m1))/60).toFixed(1);};
  const save=async()=>{
    if(!form.employee_id||!form.date)return;
    const emp=employees.find(e=>e.id===form.employee_id);
    const hours=+calcH(form.check_in,form.check_out);
    const item={...form,id:uid(),employee_name:emp?.name||"",hours,created_at:now()};
    const r=await db("attendance").ins(item);
    sR(p=>[r||item,...p]);
    sF({employee_id:"",employee_name:"",date:now(),check_in:"",check_out:"",notes:""});sSh(false);
  };
  const del=async r=>{await reqDelete("attendance",r.id,`حضور: ${r.employee_name} - ${r.date}`,r,cu.username);sCD(null);alert("تم إرسال طلب الحذف");};
  const filtered=selEmp?records.filter(r=>r.employee_id===selEmp):records;
  const empStats=employees.map(e=>{const er=records.filter(r=>r.employee_id===e.id);return{...e,days:er.length,hours:er.reduce((s,r)=>s+(+r.hours||0),0).toFixed(1)};});
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
      <div><div style={{fontSize:18,fontWeight:800}}>🕐 الحضور والانصراف</div><div style={{fontSize:11,color:C.mu}}>{records.length} سجل</div></div>

    </div>
    <div className="g3" style={{marginBottom:13}}>{empStats.map(e=>(<div key={e.id} style={{...card,marginBottom:0,borderTop:`3px solid ${e.color||C.ac}`}}><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}><div style={{width:30,height:30,borderRadius:"50%",background:e.color||C.ac,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12}}>{(e.name||"؟")[0]}</div><div style={{fontWeight:700,fontSize:12}}>{e.name}</div></div><div className="g2" style={{marginBottom:0}}><div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:e.color||C.ac}}>{e.days}</div><div style={{fontSize:9,color:C.mu}}>يوم حضور</div></div><div style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:e.color||C.ac}}>{e.hours}</div><div style={{fontSize:9,color:C.mu}}>ساعة</div></div></div></div>))}</div>
    <div style={{marginBottom:11}}>
      <select style={{...sel,maxWidth:210}} value={selEmp} onChange={e=>sSE(e.target.value)}><option value="">جميع الموظفين</option>{employees.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}</select>
    </div>
    <div style={card}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:380}}>
      <thead><tr>{["التاريخ","الموظف","الحضور","الانصراف","الساعات","ملاحظات",""].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
      <tbody>{filtered.map(r=>(<tr key={r.id}><td style={{...td,color:C.ac,fontWeight:600}}>{r.date}</td><td style={td}>{r.employee_name}</td><td style={{...td,color:C.gr}}>{r.check_in}</td><td style={{...td,color:C.rd}}>{r.check_out}</td><td style={{...td,fontWeight:700}}>{r.hours} س</td><td style={{...td,fontSize:10,color:C.mu}}>{r.notes}</td><td style={td}>{canEdit&&<button style={{...btn("danger"),padding:"2px 5px",fontSize:10}} onClick={()=>sCD(r)}>🗑</button>}</td></tr>))}</tbody>
    </table></div></div>

    {show&&<Modal title="تسجيل حضور" onClose={()=>sSh(false)}>
      <Lbl label="الموظف / المستخدم" req><select style={sel} value={form.employee_id} onChange={e=>fv("employee_id",e.target.value)}><option value="">اختر</option>{(users.length>0?users:employees).map(e=><option key={e.id} value={e.id}>{e.fullname||e.name||e.username}</option>)}</select></Lbl>

// ═══ CUSTODY ═══
function CustodyPage({employees,users,canEdit,cu}){
  const [accounts,sAcc]=useState([]);const [txns,sTxns]=useState([]);
  const [showD,setSD]=useState(false);const [showT,setST]=useState(false);const [showDe,setSDe]=useState(false);
  const [dF,setDF]=useState({employee_id:"",amount:"",reason:""});
  const [tF,setTF]=useState({from_id:"",to_id:"",amount:"",transfer_cost:"",reason:""});
  const [deF,setDEF]=useState({employee_id:"",amount:"",reason:""});
  useEffect(()=>{db("custody").all().then(d=>sAcc(d));db("custody_transactions").all().then(d=>sTxns(d.sort((a,b)=>b.date>a.date?1:-1)));}, []);
  const gA=eid=>accounts.find(a=>a.employee_id===eid);
  const gOrC=async(eid,ename)=>{const ex=accounts.find(a=>a.employee_id===eid);if(ex)return ex;const n={id:uid(),employee_id:eid,employee_name:ename,balance:0,last_updated:now()};const r=await db("custody").ins(n);sAcc(p=>[...p,r||n]);return r||n;};
  const deposit=async()=>{
    if(!dF.employee_id||!dF.amount)return;
    const emp=employees.find(e=>e.id===dF.employee_id);
    const acc=await gOrC(dF.employee_id,emp?.name||"");
    const nb=(+acc.balance||0)+(+dF.amount);
    sAcc(p=>p.map(a=>a.employee_id===dF.employee_id?{...a,balance:nb}:a));
    await db("custody").upd(acc.id,{balance:nb,last_updated:now()});
    const t={id:uid(),from_id:"company",from_type:"company",to_id:dF.employee_id,to_type:"employee",amount:+dF.amount,transfer_cost:0,reason:dF.reason,transaction_type:"deposit",date:now(),created_by:cu.username};
    sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    setDF({employee_id:"",amount:"",reason:""});setSD(false);
  };
  const transfer=async()=>{
    if(!tF.from_id||!tF.to_id||!tF.amount)return;
    const amt=+tF.amount;const cost=+tF.transfer_cost||0;const total_deduct=amt+cost;
    const isTreasuryFrom=tF.from_id==="treasury";const isTreasuryTo=tF.to_id==="treasury";

    if(isTreasuryFrom){
      // من الخزنة إلى موظف
      const treas=await db("treasury").all();const tr=treas[0];if(!tr||+tr.balance<total_deduct){alert("رصيد الخزنة غير كافٍ");return;}
      await db("treasury").upd(tr.id,{balance:(+tr.balance)-total_deduct,last_updated:now()});
      const toEmp=employees.find(e=>e.id===tF.to_id);const toAcc=await gOrC(tF.to_id,toEmp?.name||"");
      const nt=(toAcc.balance||0)+amt;sAcc(p=>p.map(a=>a.employee_id===tF.to_id?{...a,balance:nt}:a));await db("custody").upd(toAcc.id,{balance:nt,last_updated:now()});
      const t={id:uid(),from_id:"main-treasury",from_type:"treasury",to_id:tF.to_id,to_type:"employee",amount:amt,transfer_cost:cost,reason:tF.reason,transaction_type:"transfer",date:now(),created_by:cu.username};
      sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    } else if(isTreasuryTo){
      // من موظف إلى الخزنة
      const fromAcc=accounts.find(a=>a.employee_id===tF.from_id);if(!fromAcc||fromAcc.balance<total_deduct){alert("الرصيد غير كافٍ");return;}
      const nf=(fromAcc.balance||0)-total_deduct;sAcc(p=>p.map(a=>a.employee_id===tF.from_id?{...a,balance:nf}:a));await db("custody").upd(fromAcc.id,{balance:nf,last_updated:now()});
      const treas=await db("treasury").all();const tr=treas[0];if(tr)await db("treasury").upd(tr.id,{balance:(+tr.balance)+amt,last_updated:now()});
      const t={id:uid(),from_id:tF.from_id,from_type:"employee",to_id:"main-treasury",to_type:"treasury",amount:amt,transfer_cost:cost,reason:tF.reason,transaction_type:"transfer",date:now(),created_by:cu.username};
      sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    } else {
      // من موظف إلى موظف
      const fromAcc=accounts.find(a=>a.employee_id===tF.from_id);const toEmp=employees.find(e=>e.id===tF.to_id);
      if(!fromAcc||fromAcc.balance<total_deduct){alert("الرصيد غير كافٍ");return;}
      const toAcc=await gOrC(tF.to_id,toEmp?.name||"");
      const nf=(fromAcc.balance||0)-total_deduct;const nt=(toAcc.balance||0)+amt;
      sAcc(p=>p.map(a=>{if(a.employee_id===tF.from_id)return{...a,balance:nf};if(a.employee_id===tF.to_id)return{...a,balance:nt};return a;}));
      await db("custody").upd(fromAcc.id,{balance:nf,last_updated:now()});await db("custody").upd(toAcc.id,{balance:nt,last_updated:now()});
      const t={id:uid(),from_id:tF.from_id,from_type:"employee",to_id:tF.to_id,to_type:"employee",amount:amt,transfer_cost:cost,reason:tF.reason,transaction_type:"transfer",date:now(),created_by:cu.username};
      sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    }
    setTF({from_id:"",to_id:"",amount:"",transfer_cost:"",reason:""});setST(false);
  };
  const deduct=async()=>{
    if(!deF.employee_id||!deF.amount)return;
    const acc=accounts.find(a=>a.employee_id===deF.employee_id);if(!acc)return;
    const nb=(acc.balance||0)-(+deF.amount);
    sAcc(p=>p.map(a=>a.employee_id===deF.employee_id?{...a,balance:nb}:a));
    await db("custody").upd(acc.id,{balance:nb,last_updated:now()});
    const t={id:uid(),from_id:deF.employee_id,from_type:"employee",to_id:"company",to_type:"company",amount:+deF.amount,transfer_cost:0,reason:deF.reason,transaction_type:"deduct",date:now(),created_by:cu.username};
    sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    setDEF({employee_id:"",amount:"",reason:""});setSDe(false);
  };
  const gEN=id=>{if(id==="main-treasury"||id==="treasury")return "🏛️ الخزنة";return employees.find(e=>e.id===id)?.name||id;};
  const total=accounts.reduce((s,a)=>s+(+a.balance||0),0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13,flexWrap:"wrap",gap:7}}>
      <div><div style={{fontSize:18,fontWeight:800}}>🏦 نظام العهدة</div><div style={{fontSize:11,color:C.mu}}>إجمالي: {fmtN(total)} ج.م</div></div>
      {canEdit&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

// ═══ SALARY ═══
function SalaryMgmt({employees,users,cu}){
  const [records,sR]=useState([]);const [show,sSh]=useState(false);const [editR,sER]=useState(null);const [viewR,sVR]=useState(null);const [confirmDel,sCD]=useState(null);
  const [form,sF]=useState({employee_id:"",month:"",bonuses:0,deductions:0,notes:""});
  const fv=(k,v)=>sF(p=>({...p,[k]:v}));const isAdmin=cu.role==="admin";
  useEffect(()=>{db("salary_records").all().then(d=>sR(d.sort((a,b)=>b.created_at>a.created_at?1:-1)));}, []);
  const openAdd=()=>{sER(null);sF({employee_id:"",month:"",bonuses:0,deductions:0,notes:""});sSh(true);};
  const openEdit=r=>{sER(r);sF({employee_id:r.employee_id||"",month:r.month||"",bonuses:r.bonuses||0,deductions:r.deductions||0,notes:r.notes||""});sSh(true);};
  const save=async()=>{
    if(!form.employee_id||!form.month)return;
    const emp=(users.length>0?users:employees).find(e=>e.id===form.employee_id);
    const base=+emp?.salary||0;const net=base+(+form.bonuses||0)-(+form.deductions||0);
    const empName=emp?.fullname||emp?.name||emp?.username||"";
    if(editR){const up={...editR,...form,base_salary:base,net_salary:net,employee_name:empName};sR(p=>p.map(x=>x.id===editR.id?up:x));await db("salary_records").upd(editR.id,{...form,base_salary:base,net_salary:net,employee_name:emp?.name||""});}
    else{const item={id:uid(),employee_id:form.employee_id,employee_name:emp?.name||"",month:form.month,base_salary:base,bonuses:+form.bonuses||0,deductions:+form.deductions||0,net_salary:net,status:"pending",approved_by:"",notes:form.notes,created_at:now()};const r=await db("salary_records").ins(item);sR(p=>[r||item,...p]);}
    sSh(false);
  };
  const approve=async r=>{const up={...r,status:"approved",approved_by:cu.username};sR(p=>p.map(x=>x.id===r.id?up:x));await db("salary_records").upd(r.id,{status:"approved",approved_by:cu.username});};
  const pay=async r=>{const up={...r,status:"paid"};sR(p=>p.map(x=>x.id===r.id?up:x));await db("salary_records").upd(r.id,{status:"paid"});};
  const del=async r=>{await reqDelete("salary_records",r.id,`راتب: ${r.employee_name} - ${r.month}`,r,cu.username);sCD(null);alert("تم إرسال طلب الحذف");};
  const tPaid=records.filter(r=>r.status==="paid").reduce((s,r)=>s+(+r.net_salary||0),0);
  return(<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:13}}>
      <div><div style={{fontSize:18,fontWeight:800}}>💰 الرواتب والمكافآت</div><div style={{fontSize:11,color:C.mu}}>إجمالي مدفوع: {fmtN(tPaid)} ج.م</div></div>
      <button style={btn("primary")} onClick={openAdd}>+ تسجيل راتب</button>
    </div>
    <div className="g4"><Stat label="مدفوع" value={`${fmtN(tPaid)} ج.م`} col={C.gr}/><Stat label="انتظار موافقة" value={records.filter(r=>r.status==="pending").length} col={C.am}/><Stat label="موافق عليها" value={records.filter(r=>r.status==="approved").length} col={C.ac}/><Stat label="إجمالي السجلات" value={records.length} col={C.pu}/></div>
    <div style={card}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:500}}><thead><tr>{["الموظف","الشهر","الأساسي","مكافآت","خصومات","الصافي","الحالة",""].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead><tbody>
      {records.map(r=>(<tr key={r.id}><td style={{...td,fontWeight:600}}>{r.employee_name}</td><td style={td}>{r.month}</td><td style={td}>{fmtN(+r.base_salary)}</td><td style={{...td,color:C.gr}}>{(+r.bonuses||0)>0?`+${r.bonuses}`:"—"}</td><td style={{...td,color:C.rd}}>{(+r.deductions||0)>0?`-${r.deductions}`:"—"}</td><td style={{...td,fontWeight:800,color:C.ac}}>{fmtN(+r.net_salary)} ج.م</td><td style={td}><Bdg v={r.status}/></td>
      <td style={td}><div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
        <button style={{...btn("ghost"),padding:"2px 5px",fontSize:10}} onClick={()=>sVR(r)}>👁</button>
        {isAdmin&&r.status==="pending"&&<button style={{...btn("success"),padding:"2px 5px",fontSize:10}} onClick={()=>approve(r)}>✅</button>}
        {isAdmin&&r.status==="approved"&&<button style={{...btn("primary"),padding:"2px 5px",fontSize:10}} onClick={()=>pay(r)}>💸 صرف</button>}
        <button style={{...btn("ghost"),padding:"2px 5px",fontSize:10}} onClick={()=>openEdit(r)}>✎</button>
        <button style={{...btn("danger"),padding:"2px 5px",fontSize:10}} onClick={()=>sCD(r)}>🗑</button>
      </div></td></tr>))}
    </tbody></table></div></div>
    {confirmDel&&<Confirm onYes={()=>del(confirmDel)} onNo={()=>sCD(null)}/>}
    {viewR&&<Modal title="تفاصيل الراتب" onClose={()=>sVR(null)}>{[["الموظف",viewR.employee_name],["الشهر",viewR.month],["الأساسي",`${fmtN(+viewR.base_salary)} ج.م`],["مكافآت",`${fmtN(+viewR.bonuses)} ج.م`],["خصومات",`${fmtN(+viewR.deductions)} ج.م`],["الصافي",`${fmtN(+viewR.net_salary)} ج.م`],["الحالة",viewR.status]].map(([l,v])=>(<div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:`1px solid ${C.br}`}}><span style={{color:C.mu,fontSize:12}}>{l}</span><span style={{fontWeight:600,fontSize:12}}>{v}</span></div>))}<div style={{display:"flex",justifyContent:"flex-end",marginTop:11}}><button style={btn("ghost")} onClick={()=>sVR(null)}>إغلاق</button></div></Modal>}
    {show&&<Modal title={editR?"تعديل راتب":"تسجيل راتب جديد"} onClose={()=>sSh(false)}>
      <Lbl label="الموظف" req><select style={sel} value={form.employee_id} onChange={e=>fv("employee_id",e.target.value)}><option value="">اختر موظف / مستخدم</option>{(users.length>0?users:employees).map(e=><option key={e.id} value={e.id}>{e.fullname||e.name||e.username}{(e.job_title)?` — ${e.job_title}`:""} · {fmtN(+(e.salary)||0)} ج.م</option>)}</select></Lbl>
      <Lbl label="الشهر" req><input style={inp} type="month" value={form.month} onChange={e=>fv("month",e.target.value)}/></Lbl>
      <div className="f2c" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
        <Lbl label="مكافآت (ج.م)"><input style={inp} type="number" value={form.bonuses} onChange={e=>fv("bonuses",e.target.value)} placeholder="0"/></Lbl>
        <Lbl label="خصومات / جزاءات (ج.م)"><input style={inp} type="number" value={form.deductions} onChange={e=>fv("deductions",e.target.value)} placeholder="0"/></Lbl>
      </div>
      {form.employee_id&&<div style={{background:C.acb,borderRadius:7,padding:"6px 11px",marginBottom:9,fontSize:12,color:C.ac}}>الصافي: {fmtN((employees.find(e=>e.id===form.employee_id)?.salary||0)+(+form.bonuses||0)-(+form.deductions||0))} ج.م</div>}
      <Lbl label="ملاحظات"><input style={inp} value={form.notes} onChange={e=>fv("notes",e.target.value)}/></Lbl>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={btn("ghost")} onClick={()=>sSh(false)}>إلغاء</button><button style={btn("primary")} onClick={save}>💾 حفظ</button></div>
    </Modal>}
  </div>);
}

function QuotationsPage({canEdit,cu,onConvert}){
  const [quotes,sQ]=useState([]);const [show,sSh]=useState(false);const [editQ,sEQ]=useState(null);const [viewQ,sVQ]=useState(null);const [confirmDel,sCD]=useState(null);

      {quotes.map(q=>(<div key={q.id} style={{...card,marginBottom:0}}>

function AllReports({employees,tasks,invoices,expenses}){
  const [tab,sTab]=useState("financial");
  const [from,sFrom]=useState(()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`;});
  const [to,sTo]=useState(()=>now());
  const [sRecs,sSR]=useState([]);const [sInvs,sSI]=useState([]);
  const [cons,sCons]=useState([]);const [pays,sPays]=useState([]);const [vis,sVis]=useState([]);const [att,sAtt]=useState([]);
  useEffect(()=>{db("salary_records").all().then(d=>sSR(d));db("sales_invoices").all().then(d=>sSI(d));db("contracts").all().then(d=>sCons(d));db("payments").all().then(d=>sPays(d));db("visits").all().then(d=>sVis(d));db("attendance").all().then(d=>sAtt(d));}, []);
  const inR=date=>date&&date>=from&&date<=to;
  const fExp=expenses.filter(e=>inR(e.date));const fPurch=invoices.filter(i=>inR(i.date));
  const fSales=sInvs.filter(i=>inR(i.date)&&i.status==="paid");const fPay=pays.filter(p=>inR(p.paid_date));
  const fSal=sRecs.filter(r=>inR(r.created_at)&&r.status==="paid");const fVis=vis.filter(v=>inR(v.visit_date));const fAtt=att.filter(a=>inR(a.date));

// ═══ TREASURY - الخزنة الرئيسية ═══
function TreasuryPage({cu,canEdit}){
  const [treas,sT]=useState({id:"main-treasury",name:"الخزنة الرئيسية",balance:0,last_updated:now()});
  const [txns,sTxns]=useState([]);const [show,sSh]=useState(null);
  const [form,sF]=useState({amount:"",reason:"",type:"deposit"});
  useEffect(()=>{
    db("treasury").all().then(d=>{if(d.length>0)sT(d[0]);});
    db("custody_transactions").all().then(d=>sTxns(d.filter(t=>t.from_type==="treasury"||t.to_type==="treasury").sort((a,b)=>b.date>a.date?1:-1)));
  },[]);
  const doTx=async()=>{
    if(!form.amount||+form.amount<=0)return;
    const amt=+form.amount;let nb=+treas.balance;
    if(form.type==="withdraw"){if(nb<amt){alert("الرصيد غير كافٍ");return;}nb-=amt;}else nb+=amt;
    sT(p=>({...p,balance:nb,last_updated:now()}));
    await db("treasury").upd(treas.id,{balance:nb,last_updated:now()});
    const t={id:uid(),from_id:form.type==="deposit"?"external":"main-treasury",from_type:form.type==="deposit"?"external":"treasury",to_id:form.type==="withdraw"?"external":"main-treasury",to_type:form.type==="withdraw"?"external":"treasury",amount:amt,transfer_cost:0,reason:form.reason,transaction_type:form.type,date:now(),created_by:cu.username};
    sTxns(p=>[t,...p]);await db("custody_transactions").ins(t);
    sF({amount:"",reason:"",type:"deposit"});sSh(null);
  };
  return(<div>
    <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>🏛️ الخزنة الرئيسية</div>
    <div style={{...card,borderTop:`3px solid ${C.gr}`,textAlign:"center",padding:32}}>
      <div style={{fontSize:11,color:C.mu,marginBottom:6}}>الرصيد الحالي</div>
      <div style={{fontSize:44,fontWeight:800,color:treas.balance>=0?C.gr:C.rd}}>{fmtN(+treas.balance)} ج.م</div>
      <div style={{fontSize:10,color:C.mu,marginTop:6}}>آخر تحديث: {treas.last_updated}</div>
    </div>
    {canEdit&&<div style={{display:"flex",gap:9,marginBottom:16,flexWrap:"wrap"}}>
      <button style={{...btn("success"),flex:1,padding:"11px"}} onClick={()=>{sF({amount:"",reason:"",type:"deposit"});sSh("tx");}}>💵 إيداع في الخزنة</button>
      <button style={{...btn("danger"),flex:1,padding:"11px"}} onClick={()=>{sF({amount:"",reason:"",type:"withdraw"});sSh("tx");}}>💸 سحب من الخزنة</button>
    </div>}
    <div style={card}><div style={{fontSize:13,fontWeight:700,marginBottom:11}}>📝 آخر الحركات</div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",minWidth:300}}>
        <thead><tr>{["التاريخ","النوع","المبلغ","السبب","بواسطة"].map(h=><th key={h} style={th}>{h}</th>)}</tr></thead>
        <tbody>{txns.slice(0,20).map(t=>{const dep=t.transaction_type==="deposit";return(<tr key={t.id}><td style={td}>{t.date}</td><td style={{...td,color:dep?C.gr:C.rd,fontWeight:600}}>{dep?"💵 إيداع":"💸 سحب"}</td><td style={{...td,color:dep?C.gr:C.rd,fontWeight:700}}>{fmtN(+t.amount)} ج.م</td><td style={{...td,fontSize:10,color:C.mu}}>{t.reason}</td><td style={{...td,fontSize:10,color:C.mu}}>{t.created_by}</td></tr>);})}</tbody>
      </table></div>
    </div>
    {show==="tx"&&<Modal title={form.type==="deposit"?"💵 إيداع في الخزنة":"💸 سحب من الخزنة"} onClose={()=>sSh(null)}>
      <div style={{background:form.type==="deposit"?C.grb:C.rdb,borderRadius:8,padding:"8px 13px",fontSize:12,color:form.type==="deposit"?C.gr:C.rd,marginBottom:13}}>الرصيد الحالي: {fmtN(+treas.balance)} ج.م</div>
      <Lbl label="المبلغ (ج.م)" req><input style={inp} type="number" value={form.amount} onChange={e=>sF(p=>({...p,amount:e.target.value}))}/></Lbl>
      <Lbl label="السبب / الملاحظة"><input style={inp} value={form.reason} onChange={e=>sF(p=>({...p,reason:e.target.value}))}/></Lbl>
      <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button style={btn("ghost")} onClick={()=>sSh(null)}>إلغاء</button><button style={btn(form.type==="deposit"?"success":"danger")} onClick={doTx}>{form.type==="deposit"?"💵 إيداع":"💸 سحب"}</button></div>
    </Modal>}
  </div>);
}

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:30,height:30,borderRadius:"50%",background:cu.role==="admin"?C.ac:C.pu,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:13,flexShrink:0}}>{(cu.fullname||cu.username||"؟")[0]}</div>
          <div><div style={{fontWeight:700,fontSize:11}}>{cu.fullname||cu.username}</div><div style={{fontSize:9,color:C.mu}}>{cu.role==="admin"?"مدير النظام":"مستخدم"}</div></div>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {Object.entries(sections).map(([sec,items])=>(<div key={sec} style={{padding:"4px 0"}}>
          <div style={{fontSize:9,color:C.di,fontWeight:700,padding:"4px 13px",textTransform:"uppercase",letterSpacing:0.8}}>{sec}</div>
          {items.map(item=>(<div key={item.id} style={{display:"flex",alignItems:"center",gap:7,padding:"7px 13px",cursor:"pointer",fontSize:11,fontWeight:page===item.id?700:400,color:page===item.id?C.ac:C.mu,background:page===item.id?C.acb:"transparent",borderRight:`3px solid ${page===item.id?C.ac:"transparent"}`,transition:"all 0.12s"}} onClick={()=>nav(item.id)}>
            <span style={{fontSize:13}}>{item.icon}</span>
            <span style={{flex:1}}>{item.label}</span>
            {item.perm==="view"&&<span style={{fontSize:8,color:C.am,background:C.amb,padding:"1px 4px",borderRadius:4}}>عرض</span>}
          </div>))}
        </div>))}
      </div>
      <div style={{padding:10,borderTop:`1px solid ${C.br}`}}>
        <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:6}}><span style={{width:5,height:5,borderRadius:"50%",background:C.gr,display:"inline-block"}}/><span style={{fontSize:10,color:C.gr}}>متصل بـ Supabase</span></div>
        <button onClick={()=>setCU(null)} style={{width:"100%",background:C.rdb,border:"none",borderRadius:6,color:C.rd,padding:"6px",fontSize:11,cursor:"pointer",fontFamily:"'Cairo',sans-serif",fontWeight:600}}>🚪 تسجيل الخروج</button>
      </div>
    </div>
    <div className="main-wrap">
      <div className="topbar">
        <button className="ham-btn" onClick={()=>setSO(!sideOpen)}>☰</button>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:14}}>{curPage?.icon}</span><span style={{fontWeight:700,fontSize:12,color:C.ac}}>TS v4.5</span></div>
        <div style={{width:30,height:30,borderRadius:"50%",background:cu.role==="admin"?C.ac:C.pu,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,color:"#fff",fontSize:12}}>{(cu.fullname||cu.username||"؟")[0]}</div>
      </div>
      <div className="main-pad" style={{padding:"18px 20px",flex:1}}>
        {syncMsg&&<div style={{position:"fixed",top:11,left:"50%",transform:"translateX(-50%)",background:C.sf,border:`1px solid ${C.br}`,padding:"6px 15px",borderRadius:99,fontSize:11,fontWeight:600,zIndex:9999,fontFamily:"'Cairo',sans-serif",color:C.tx,whiteSpace:"nowrap"}}>{syncMsg}</div>}
        {renderPage()}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
